spec_version: "0.1.0"
name: paper-verifier
version: 1.0.0
description: Independent verification sub-agent that validates paper existence and claim accuracy before gap findings are finalized.
author: aaryan-guglani
license: MIT

model:
  preferred: "claude-haiku-4-5-20251001"
  fallback:
    - "openai:gpt-4o-mini"
  constraints:
    temperature: 0.0
    max_tokens: 2048

tools:
  - fetch-abstract

runtime:
  max_turns: 10
  timeout: 60

tags:
  - verification
  - research-integrity
  - checker

metadata:
  role: checker
  parent_agent: sage-agent
  sod_role: verifier
